services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: zus_home_assessment
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d zus_home_assessment"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: apache/kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,EXTERNAL://localhost:9092

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  migrate:
    build: .
    command: sh -c "migrate && seed"
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/zus_home_assessment?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  server:
    build: .
    command: server
    environment:
      PORT: 8080
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/zus_home_assessment?sslmode=disable
      KAFKA_BROKERS: kafka:29092
      KAFKA_ORDER_TOPIC: orders.created
      KAFKA_CONSUMER_GROUP: order-summary-worker
    ports:
      - "8080:8080"
    depends_on:
      migrate:
        condition: service_completed_successfully
      kafka:
        condition: service_started

  worker:
    build: .
    command: worker
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/zus_home_assessment?sslmode=disable
      KAFKA_BROKERS: kafka:29092
      KAFKA_ORDER_TOPIC: orders.created
      KAFKA_CONSUMER_GROUP: order-summary-worker
    depends_on:
      migrate:
        condition: service_completed_successfully
      kafka:
        condition: service_started

volumes:
  postgres_data:
